name: Build APK
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install EAS
        run: npm install -g eas-cli@latest
      - name: Install deps
        run: npm install
      - name: Build APK
        run: eas build -p android --profile preview --non-interactive --output ./jarvis.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: jarvis-apk
          path: ./jarvis.apk
